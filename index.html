<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERIE 4E</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>SERIE 4E</h1>
    <div class="header-squadre grande">
      <div class="squadra-header blu">
        <img src="OW.jpg" alt="Ocean Warriors">
        <div>Ocean Warriors</div>
        <div class="risultato">3-0</div>
      </div>
      <div class="squadra-header rosso">
        <img src="RP.jpg" alt="Red Phoenix">
        <div>Red Phoenix</div>
        <div class="risultato">0-3</div>
      </div>
    </div>
  </header>

  <!-- SEZIONI -->
  <div class="container">

    <!-- CALENDARIO PARTITE -->
    <div class="colonna" id="calendario">
      <h2>Calendario Partite</h2>
      <div id="calendario-partite"></div>
    </div>

    <!-- CLASSIFICA MARCATORI -->
    <div class="colonna" id="marcatori">
      <h2>Classifica Marcatori</h2>
      <ul id="lista-marcatori"></ul>
    </div>

    <!-- FORMAZIONI -->
    <div class="colonna" id="formazioni">
      <h2>Formazioni</h2>
      <div class="squadra" id="squadra1"></div>
      <div class="squadra" id="squadra2"></div>
    </div>

  </div>

  <footer>
    &copy; SERIE 4E - Campionato Classe
  </footer>

  <!-- SCRIPT -->
  <script src="script.js"></script>
</body>
</html>
